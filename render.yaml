services:
  - type: web
    name: charon
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /health
    maxShutdownDelaySeconds: 60
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_PLANNER_API_KEY
        sync: false
      - key: GROQ_RESPONSE_API_KEY
        sync: false
      - key: GROQ_PLANNER_MODEL
        value: groq/compound
      - key: GROQ_RESPONSE_MODEL
        value: qwen/qwen3-32b
      - key: LLM_MAX_OUTPUT_TOKENS
        value: "512"
      - key: LLM_PLAN_MAX_OUTPUT_TOKENS
        value: "4096"
      - key: LLM_RESPONSE_MAX_OUTPUT_TOKENS
        value: "1024"
      - key: LLM_MAX_SEQUENCE_ACTIONS
        value: "0"
      - key: LLM_SEQUENCE_RESPONSE_MAX_STEPS
        value: "12"
      - key: LLM_MAX_INPUT_TOKENS
        value: "5000"
      - key: LLM_MAX_CALL_INPUT_TOKENS
        value: "24000"
      - key: LLM_PLANNER_MAX_INPUT_TOKENS
        value: "2400"
      - key: LLM_PLANNER_RETRY_INPUT_TOKENS
        value: "1900"
      - key: LLM_CONTEXT_TOKEN_BUDGET
        value: "1600"
      - key: LLM_MAX_CONTEXT_MESSAGES
        value: "12"
      - key: WHATSAPP_GROUP_SCOPE
        value: all
      - key: WHATSAPP_GROUP_ID
        sync: false
      - key: WHATSAPP_GROUP_NAME
        sync: false
      - key: WHATSAPP_REPLY_MODE
        value: tag_only
      - key: WHATSAPP_HISTORY_LIMIT
        value: "200"
      - key: BOT_TIMEZONE
        value: America/Phoenix
      - key: DEFAULT_MEETING_DURATION_MINUTES
        value: "180"
      - key: REMINDERS_ENABLED
        value: "true"
      - key: REMINDER_LEAD_MINUTES
        value: "1440,360,60,10,2,0"
      - key: REMINDER_CHECK_INTERVAL_MS
        value: "60000"
      - key: GOOGLE_MEET_LINK
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_MEET_ACCESS_TYPE
        value: OPEN
      - key: GOOGLE_MEET_ENTRY_POINT_ACCESS
        value: ALL
